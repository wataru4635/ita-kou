    - generic [ref=e18]:
      - generic [ref=e19]:
        - img "NC旋盤による精密切削加工" [ref=e21]
        - generic [ref=e23]:
          - paragraph [ref=e24]: SERVICES 01
          - heading "精密切削加工" [level=2] [ref=e25]
          - paragraph [ref=e26]:
            - text: 金属材料を削り出し、図面通りの形状・精度で加工を行います。
            - text: 当社では、原子力関連設備やLNG船のサブマージドポンプなどにも採用される品質基準に対応しており、ミクロン単位の精度が求められる加工においても、安定した品質を実現しています。
            - text: 切削加工は、わずかな誤差が製品全体の性能や安全性に大きく影響するため、一つひとつの工程において高い精度と確かな技術が求められます。
            - text: 長年培った職人の技術と最新設備を組み合わせることで、高精度かつ再現性の高いものづくりを行っています。
      - generic [ref=e27]:
        - img "汎用旋盤でモータ部品を加工する職人" [ref=e29]
        - generic [ref=e31]:
          - paragraph [ref=e32]: SERVICES 02
          - heading "モータ部品加工" [level=2] [ref=e33]
          - paragraph [ref=e34]:
            - text: 創業当初は原子力発電所向けポンプ部品にたずさわり、現在はサブマージドポンプモータの部品加工を主軸としております。
            - text: サブマージドポンプモータ部品は、耐久性・精度・信頼性が求められる重要な部品です。
            - text: わずかなズレが性能に影響を与えるため、安定した加工技術が不可欠です。
            - text: これまで培ってきた経験と技術をもとに、用途や仕様に応じた最適な加工を行い、高品質な製品を提供しています。
      - generic [ref=e35]:
        - img "工場でNC旋盤を操作する作業者" [ref=e37]
        - generic [ref=e39]:
          - paragraph [ref=e40]: SERVICES 03
          - heading "幅広い分野への対応力" [level=2] [ref=e41]
          - paragraph [ref=e42]:
            - text: 社会インフラを支える設備から一般産業機械、さらには射出成形機に至るまで、幅広い分野の部品加工に対応しています。
            - text: それぞれの用途や使用環境に応じて求められる精度・耐久性・信頼性に対し、これまで培ってきた技術と経験を活かし、最適な加工方法を選定。
            - text: 安定した品質と高い再現性で、多様なニーズに応えるものづくりを実現しています。
      - generic [ref=e43]:
        - img "棚に整理された測定具と検査用工具" [ref=e45]
        - generic [ref=e47]:
          - paragraph [ref=e48]: SERVICES 04
          - heading "一貫対応と柔軟な対応力、 そして徹底した品質管理" [level=2] [ref=e49]:
            - text: 一貫対応と柔軟な対応力、
            - text: そして徹底した品質管理
          - paragraph [ref=e50]:
            - text: ご相談から製作まで、すべての工程に責任を持って対応いたします。
            - text: 少数精鋭の体制だからこそ可能な、きめ細やかな対応と迅速な意思決定により、お客様のご要望に的確にお応えします。
            - text: また、一品一様の加工や小ロットのご依頼にも柔軟に対応し、用途や仕様に応じて最適な加工方法を選定。さらに、各工程において徹底した品質管理を行い、安定した品質を維持しています。
            - text: 細かなご要望にも丁寧に向き合い、スピード感のある対応と柔軟な判断、そして確かな品質で、多様なニーズに応えるものづくりを実現しています。
            - text: 一つひとつの仕事に真摯に向き合い、信頼されるパートナーとして長くお付き合いいただける関係を築いていきます。
