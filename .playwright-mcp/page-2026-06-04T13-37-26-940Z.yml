        - generic [ref=e58]: SERVICES
      - paragraph [ref=e59]:
        - text: しっかりとした工程管理の元、
        - text: 高精度、高品質を実現する加工技術。
      - paragraph [ref=e60]:
        - text: 精密切削加工を中心に、ポンプ部品をはじめとした各種機械部品の製造を行っています。
        - text: 原子力関連設備やLNG船のサブマージドポンプなど、高い信頼性が求められる分野にも対応し、社会インフラを支える製品づくりに携わっています。
        - text: 用途や使用環境に応じて求められる性能を的確に捉え、最適な加工方法をご提案。
        - text: ミクロン単位の精度が求められる加工においても、一つひとつの工程で品質を徹底的に追求し、安定した製品を実現しています。
        - text: また、少数精鋭の体制を活かし、多品種・小ロットにも柔軟に対応。
        - text: ご相談から製作まで一貫して対応することで、スピーディーかつ的確なものづくりを提供します。
