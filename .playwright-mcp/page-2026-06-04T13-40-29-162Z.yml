      - paragraph [ref=e26]: 「職人の技術と最新設備の融合」
      - paragraph [ref=e27]:
        - text: 受け継がれる職人の技。進化を続ける最新設備。 その融合が、常識を超える品質を生み出します。
        - text: 一つひとつの工程に宿る熟練の技術と、精度を極限まで高めるテクノロジー。 その両輪が支え合うことで、私たちは常に安定した高品質と、 時代のニーズに応える柔軟なものづくりを実現してきました。
        - text: 私たちは、人の手だからこそ生まれる繊細さと、機械だからこそ実現できる正確さ、 そのどちらも欠かすことなく追求し続けています。 目に見える品質だけでなく、その先にある安心や信頼までも提供すること。 それが、私たちの使命です。
        - text: 人と技術の可能性を最大限に引き出し、新たな価値を創造し続ける。 これからも私たちは、伝統と革新を融合させながら、 次の時代へとつながるものづくりに挑戦し続けます。
