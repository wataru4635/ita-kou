        - text: 特別な経験や高度な技術がなくても構いません。
        - text: 大切なのは、学ぶ意欲と、より良いものを追求し続ける気持ちです。
        - text: また、少数精鋭の環境だからこそ、一人ひとりの役割が大きく、チームワークも欠かせません。
        - text: 周囲と協力しながら、自ら考え、行動できる方を歓迎します。
        - text: 技術は、後からいくらでも身につけることができます。
        - text: しかし、ものづくりに向き合う姿勢だけは、簡単には身につきません。
        - text: 私たちは、その“姿勢”を何よりも大切にしています。
