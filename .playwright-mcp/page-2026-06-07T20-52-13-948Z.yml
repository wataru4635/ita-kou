      - generic [ref=e24]:
        - heading "一切の妥協なき切削加工へのこだわり" [level=2] [ref=e25]
        - paragraph [ref=e26]:
          - text: 有限会社板岡工作所は、兵庫県神戸市西区にて機械用部品の切削加工を行っております。
          - text: 私たちは少数精鋭の体制のもと、すべての工程に責任を持ち、精度を追求したものづくりを続けてまいりました。
          - text: 切削加工は、わずかな誤差が製品全体の品質を左右する仕事です。だからこそ、一つひとつの工程に妥協せず、確かな技術と誠実な姿勢で向き合うことを大切にしています。
          - text: 少数精鋭だからこそ可能な、細やかな対応力と迅速な判断力。
          - text: お客様のご要望に真摯に応え、信頼されるパートナーであり続けることが私たちの使命です。
          - text: これからも地域に根ざした加工会社として、品質第一の姿勢を貫き、ものづくりを通じて社会に貢献してまいります。
        - paragraph [ref=e27]: 代表取締役 板岡 博史
    - generic [ref=e29]:
      - generic [ref=e30]:
        - heading "スローガン" [level=2] [ref=e31]
        - paragraph [ref=e32]: 職人の技術と最新設備の融合
        - paragraph [ref=e33]:
          - text: 受け継がれる職人の技。進化を続ける最新設備。
          - text: その融合が、常識を超える品質を生み出します。
        - paragraph [ref=e34]:
          - text: 一つひとつの工程に宿る熟練の技術と、精度を極限まで高めるテクノロジー。
          - text: その両輪によって、私たちは安定した高品質と、時代のニーズに応える柔軟なものづくりを実現しています。
          - text: 私たちは、人の手だからこそ生まれる繊細さと、機械だからこそ実現できる正確さ、
          - text: そのどちらも妥協することなく追求し続けています。
          - text: 目に見える品質だけでなく、その先にある安心や信頼まで届けること。
          - text: それが、私たちの使命です。
